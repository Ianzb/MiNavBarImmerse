name: Check & Release

env:
  PROGRAM_NAME: "HyperNavBarRules"

on:
  pull_request:
    branches: [main]
    paths:
      - "rules/immerse_rules.json"

  push:
    branches: [main]
    paths:
      - "rules/**"
  workflow_dispatch:

jobs:
  Validate-JSON:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库文件
        uses: actions/checkout@v6

      - name: 安装依赖
        run: |
          pip3 install -r scripts/requirements.txt

      - name: 校验JSON文件
        run: |
          python3 scripts/validate_json.py

  Sort-And-Build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: Validate-JSON
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    env:
      TZ: Asia/Shanghai

    steps:
      - name: 检出仓库文件
        uses: actions/checkout@v6

      - name: 安装依赖
        run: |
          pip3 install -r scripts/requirements.txt

      - name: 格式化并排序规则文件
        run: |
          python3 scripts/release.py

      - name: 更新版本信息
        id: update_version
        run: |
          VERSION=$(date +'%Y%m%d%H%M')
          VERSION_CODE=${{ github.run_number }}

          base=$(echo "${{ secrets.DUFS_URL }}" | sed 's:/*$::')

          cat <<EOF > update.json
          {
            "version": "$VERSION",
            "versionCode": $VERSION_CODE,
            "officialUrl": "$base/code/${{ env.PROGRAM_NAME }}/official.json",
            "customUrl": "$base/code/${{ env.PROGRAM_NAME }}/custom.json",
            "changelog": "$base/code/${{ env.PROGRAM_NAME }}/changelog.md"
          }
          EOF

          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/immerse_rules.json

          if git diff --cached --quiet; then
            echo "No changes to commit, skip push."
          else
            git commit -m "Release Version: $VERSION" --author="${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>"
            git push
          fi

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: 上传到 Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          name: HyperNavBarRules_${{ steps.update_version.outputs.VERSION }}
          tag_name: v${{ steps.update_version.outputs.VERSION }}
          files: rules/immerse_rules.json
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true

      - name: 上传到 DUFS
        shell: pwsh
        env:
          DUFS_URL: ${{ secrets.DUFS_URL }}
          DUFS_USER: ${{ secrets.DUFS_USER }}
          DUFS_PASSWORD: ${{ secrets.DUFS_PASSWORD }}
        run: |
          $base = $Env:DUFS_URL.TrimEnd('/')
          $auth = "$($Env:DUFS_USER):$($Env:DUFS_PASSWORD)"

          curl --fail --silent --show-error --user $auth -T "update.json"     "$base/code/${{ env.PROGRAM_NAME }}/update.json"
          curl --fail --silent --show-error --user $auth -T "changelog.md"     "$base/code/${{ env.PROGRAM_NAME }}/changelog.md"
          curl --fail --silent --show-error --user $auth -T "backup/backup.json" "$base/code/${{ env.PROGRAM_NAME }}/official.json"
          curl --fail --silent --show-error --user $auth -T "rules/immerse_rules.json" "$base/code/${{ env.PROGRAM_NAME }}/custom.json"
