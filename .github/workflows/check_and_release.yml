name: Check & Release

env:
  PROGRAM_NAME: "MiNavBarImmerse"

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'module/immerse_rules.json'
      - 'list.csv'

  push:
    branches: [ main ]
    paths:
      - 'module/**'
  workflow_dispatch:

jobs:
  Validate-JSON:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库文件
        uses: actions/checkout@v6

      - name: 安装依赖
        run: |
          pip3 install -r scripts/requirements.txt

      - name: 校验JSON文件
        run: |
          python3 scripts/validate_json.py

  Sort-And-Build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: Validate-JSON
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    env:
      TZ: Asia/Shanghai

    steps:
      - name: 检出仓库文件
        uses: actions/checkout@v6

      - name: 安装依赖
        run: |
          pip3 install -r scripts/requirements.txt

      - name: 整理JSON和CSV文件
        run: |
          python3 scripts/release.py

      - name: 更新模块文件
        id: update_module_files
        run: |
          FILE=module/module.prop

          VERSION=$(date +'%Y%m%d%H%M')
          VERSION_CODE=${{ github.run_number }}

          base=$(echo "${{ secrets.DUFS_URL }}" | sed 's:/*$::')

          sed -i "s/^version=.*/version=$VERSION/" $FILE
          sed -i "s/^versionCode=.*/versionCode=$VERSION_CODE/" $FILE

          ZIP_NAME="MiNavBarImmerse_${VERSION}.zip"
          cat <<EOF > update.json
          {
            "version": "$VERSION",
            "versionCode": $VERSION_CODE,
            "zipUrl": "$base/code/${{ env.PROGRAM_NAME }}/${{ env.PROGRAM_NAME }}.zip",
            "changelog": "$base/code/${{ env.PROGRAM_NAME }}/changelog.md"
          }
          EOF

          echo "MODULE_VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: 压缩模块文件
        run: |
          cd module
          zip -r ../MiNavBarImmerse_${{ steps.update_module_files.outputs.module_version }}.zip .

      - name: 上传到Release
        uses: softprops/action-gh-release@v2
        with:
          name: MiNavBarImmerse_${{ steps.update_module_files.outputs.module_version }}
          tag_name: AutoBuild_${{ steps.update_module_files.outputs.module_version }}
          files: MiNavBarImmerse_${{ steps.update_module_files.outputs.module_version }}.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true

      - name: 上传到Telegram
        env:
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ZIP_FILE: "${{ github.workspace }}/MiNavBarImmerse_${{ steps.update_module_files.outputs.module_version }}.zip"
        
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          COMMIT_MESSAGE="Manually run by ${{ github.actor }}"
          else
          RAW_MSG="${{ github.event.head_commit.message }}"
          TRIMMED_MSG=$(echo "$RAW_MSG" | sed -e '1{/^$/d}' -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')

          COMMIT_MESSAGE="New push to GitHub
          <pre>$TRIMMED_MSG</pre>
          by <code>${{ github.event.head_commit.author.name }}</code>
          See commit detail <a href='${{ github.event.head_commit.url }}'>here</a>"
          fi

          curl -F chat_id=${CHANNEL_ID} \
               -F message_thread_id=39 \
               -F document=@"${ZIP_FILE}" \
               -F parse_mode="HTML" \
               -F caption="$COMMIT_MESSAGE" \
               https://api.telegram.org/bot${BOT_TOKEN}/sendDocument

      - name: 上传到 DUFS
        shell: pwsh
        env:
          DUFS_URL: ${{ secrets.DUFS_URL }}
          DUFS_USER: ${{ secrets.DUFS_USER }}
          DUFS_PASSWORD: ${{ secrets.DUFS_PASSWORD }}
        run: |
          $base = $Env:DUFS_URL.TrimEnd('/')
          $auth = "$($Env:DUFS_USER):$($Env:DUFS_PASSWORD)"

          curl --fail --silent --show-error --user $auth -T "update.json"     "$base/code/${{ env.PROGRAM_NAME }}/update.json"
          curl --fail --silent --show-error --user $auth -T "changelog.md"     "$base/code/${{ env.PROGRAM_NAME }}/changelog.md"
          curl --fail --silent --show-error --user $auth -T "MiNavBarImmerse_${{ steps.update_module_files.outputs.module_version }}.zip" "$base/code/${{ env.PROGRAM_NAME }}/${{ env.PROGRAM_NAME }}.zip"
